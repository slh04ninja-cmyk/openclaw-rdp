name: "OpenClaw RDP + Tailscale"

on:
  workflow_dispatch:
    inputs:
      ts_tailnet:
        description: "Tailscale tailnet (ex: you@gmail.com)"
        required: true
      ts_api_key:
        description: "Tailscale API key"
        required: true
      ts_authkey:
        description: "Tailscale Auth key"
        required: true
      runtime_minutes:
        description: "Durée max en minutes (max 360)"
        required: false
        default: "355"
      quick_test:
        description: "Test rapide (5 min)"
        type: boolean
        default: false
      crd_code:
        description: "Chrome Remote Desktop code (optionnel)"
        required: false
        default: ""
      xiaomi_api_key:
        description: "Xiaomi MiMo Token Plan API Key (tp-xxxxx)"
        required: true
      gateway_token:
        description: "OpenClaw Gateway Token"
        required: true
        default: "e381674038f63a79c4a9f6715d8a400d364b90840fe6280b"
      telegram_bot_token:
        description: "Telegram Bot Token (optionnel)"
        required: false
        default: "8613051199:AAGFbK9GFQ2cyjRqlOmBtACgf6wffV8-xBk"

permissions:
  contents: read
  actions: write

jobs:
  openclaw-rdp:
    runs-on: windows-latest
    timeout-minutes: 370
    env:
      RDP_USER: OpenClawUser
      RDP_PASS: "OpenClaw@2026!"

    steps:
      # ── CRD Flag ──
      - name: Set CRD flag
        run: |
          $crd = @'
          ${{ inputs.crd_code }}
          '@.Trim()
          if ($crd.Length -gt 0) {
            "CRD_ENABLED=1" | Out-File -Append $env:GITHUB_ENV
          } else {
            "CRD_ENABLED=0" | Out-File -Append $env:GITHUB_ENV
          }

      # ── Chrome Remote Desktop ──
      - name: Install Chrome Remote Desktop
        if: env.CRD_ENABLED == '1'
        run: |
          $exe = "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          if (-not (Test-Path $exe)) {
            $exePath = "$env:TEMP\chromeremotedesktophost.exe"
            try {
              Invoke-WebRequest -Uri "https://dl.google.com/support/remote_assistance/ChromotingHostSetup.exe" -OutFile $exePath -ErrorAction Stop
              Start-Process -FilePath $exePath -ArgumentList "/silent", "/install" -Wait
              Remove-Item $exePath -Force
            } catch {
              $msi = "$env:TEMP\chromeremotedesktophost.msi"
              Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile $msi -ErrorAction Stop
              Start-Process msiexec.exe -ArgumentList "/i", "`"$msi`"", "/quiet", "/norestart" -Wait
              Remove-Item $msi -Force
            }
          }

      - name: Run Chrome Remote Desktop
        if: env.CRD_ENABLED == '1'
        run: |
          $raw = @'
          ${{ inputs.crd_code }}
          '@.Trim()
          $pin = "123456".Trim()
          $starter = "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          if ($raw -match '--code\s*=\s*"?([^"\s]+)') {
            $code = ([regex]::Match($raw, '--code\s*=\s*"?([^"\s]+)')).Groups[1].Value
          } elseif ($raw -match '^4\/') {
            $code = $raw
          }
          if ($code) {
            Start-Process -FilePath $starter -ArgumentList @(
              "--code=""$code""",
              "--redirect-url=""https://remotedesktop.google.com/_/oauthredirect""",
              "--name=""$Env:COMPUTERNAME""",
              "--pin=""$pin"""
            )
          }

      # ── Hostname + Runtime ──
      - name: Decide hostname + runtime
        run: |
          $hn = "openclaw"
          "TS_HOSTNAME=$hn" | Out-File -Append $env:GITHUB_ENV
          function Yes($v) { "$v" -match '^(?i:true|1|yes|on)$' }
          if ("${{ inputs.runtime_minutes }}" -match '^\d+$') {
            $runtime = [int]"${{ inputs.runtime_minutes }}"
          } else {
            $runtime = 355
          }
          if (Yes("${{ inputs.quick_test }}")) { $runtime = 5 }
          if (-not (Yes("${{ inputs.quick_test }}")) -and $runtime -lt 6) { $runtime = 355 }
          if ($runtime -gt 360) { $runtime = 355 }
          "RUNTIME_MINUTES=$runtime" | Out-File -Append $env:GITHUB_ENV

      # ── Purge Tailscale ──
      - name: Purge openclaw devices
        run: |
          try {
            $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ inputs.ts_api_key }}:"))
            $tn = [uri]::EscapeDataString("${{ inputs.ts_tailnet }}")
            $list = Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/tailnet/$tn/devices" -Headers @{ Authorization = "Basic $auth" }
            foreach ($d in $list.devices) {
              if ($d.hostname -match '^openclaw[0-9]*$') {
                $auth2 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ inputs.ts_api_key }}:"))
                Invoke-RestMethod -Method Delete -Uri "https://api.tailscale.com/api/v2/device/$($d.id)" -Headers @{ Authorization = "Basic $auth2" } -EA SilentlyContinue
              }
            }
            Write-Host "Purge terminée."
          } catch {
            Write-Host "Purge warning: $($_.Exception.Message)"
          }

      # ── Tailscale ──
      - name: Install + Up Tailscale
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $ts)) {
            $dst = "$env:TEMP\tailscale.msi"
            Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile $dst
            Start-Process msiexec.exe -ArgumentList "/i", "`"$dst`"", "/quiet", "/norestart" -Wait
            Remove-Item $dst -Force
          }
          & $ts logout | Out-Null
          & $ts up --authkey "${{ inputs.ts_authkey }}" --hostname "$env:TS_HOSTNAME" --accept-dns=true --accept-routes=true
          $ip4 = & $ts ip -4 | Select-Object -First 1
          "TAILSCALE_IP=$ip4" | Out-File -Append $env:GITHUB_ENV
          Write-Host "Tailscale IPv4: $ip4"

      # ── RDP User + Firewall ──
      - name: Enable RDP user + firewall
        run: |
          $u = $env:RDP_USER
          $p = $env:RDP_PASS
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          if (-not (Get-LocalUser -Name $u -EA SilentlyContinue)) {
            New-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member $u
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          } else {
            Set-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Enable-LocalUser -Name $u
            Add-LocalGroupMember -Group "Administrators" -Member $u -EA SilentlyContinue
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u -EA SilentlyContinue
          }
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null
          Write-Host "RDP prêt. user=$u | ip=$env:TAILSCALE_IP"

      # ── RustDesk ──
      - name: Install RustDesk
        run: |
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          if (-not (Test-Path $rdExe)) {
            try {
              $dst = "$env:TEMP\rustdesk.msi"
              Invoke-WebRequest -Uri "https://github.com/rustdesk/rustdesk/releases/download/1.3.1/rustdesk-1.3.1-x86_64.msi" -OutFile $dst
              Start-Process msiexec.exe -ArgumentList "/i", "`"$dst`"", "/quiet", "/norestart" -Wait
              Remove-Item $dst -Force
            } catch {
              winget install --id RustDesk.RustDesk -e --silent --accept-package-agreements --accept-source-agreements --disable-interactivity
            }
          }
          Start-Process -FilePath $rdExe -EA SilentlyContinue
          Start-Sleep -Seconds 5

      # ── Node.js ──
      - name: Install Node.js 22
        run: |
          $nodeCmd = Get-Command node -ErrorAction SilentlyContinue
          if ($nodeCmd) {
            $ver = & node --version 2>&1
            Write-Host "Node.js déjà présent : $ver"
          } else {
            Write-Host "Installation de Node.js..."
            winget install OpenJS.NodeJS.LTS --silent --accept-package-agreements --accept-source-agreements
            $machinePath = [System.Environment]::GetEnvironmentVariable("Path", "Machine")
            $userPath = [System.Environment]::GetEnvironmentVariable("Path", "User")
            $env:Path = "$machinePath;$userPath"
          }
          $ver = & node --version 2>&1
          Write-Host "Node.js version : $ver"

      # ── OpenClaw (install officiel Windows) ──
      - name: Install OpenClaw
        run: |
          iwr -useb https://openclaw.ai/install.ps1 | iex
          Start-Sleep -Seconds 5

          # Trouver le binaire openclaw
          $found = Get-Command openclaw -ErrorAction SilentlyContinue
          if ($found) {
            Write-Host "OpenClaw trouvé : $($found.Source)"
            $ver = & openclaw --version 2>&1
            Write-Host "OpenClaw version : $ver"
            # Sauvegarder le dossier pour les steps suivants
            $binDir = Split-Path $found.Source
            "OPENCLAW_BIN=$binDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Write-Host "WARN: openclaw non trouvé dans PATH, recherche..."
            Get-ChildItem -Path "$env:LOCALAPPDATA\pnpm" -Filter "openclaw*" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.FullName)" }
            Get-ChildItem -Path "$env:APPDATA\npm" -Filter "openclaw*" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.FullName)" }
            Get-ChildItem -Path "$env:USERPROFILE" -Filter "openclaw.exe" -Recurse -Depth 5 -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.FullName)" }
          }

      # ── Configure OpenClaw (Token Plan - doc officielle) ──
      - name: Configure OpenClaw
        run: |
          $homeDir = $env:USERPROFILE
          $configDir = "$homeDir\.openclaw"
          New-Item -ItemType Directory -Path $configDir -Force | Out-Null
          New-Item -ItemType Directory -Path "$configDir\workspace" -Force | Out-Null

          # ============================================================
          # Token Plan config (doc officielle) :
          # - Provider nommé "xiaomi-coding" (PAS "xiaomi")
          # - PAS de bloc "auth" (supprimé)
          # - apiKey directement dans le provider
          # - baseUrl Token Plan : https://token-plan-sgp.xiaomimimo.com/v1
          # ============================================================

          $config = @{
            models = @{
              mode = "merge"
              providers = @{
                "xiaomi-coding" = @{
                  baseUrl = "https://token-plan-sgp.xiaomimimo.com/v1"
                  apiKey = "${{ inputs.xiaomi_api_key }}"
                  api = "openai-completions"
                  models = @(
                    @{
                      id = "mimo-v2.5-pro"
                      name = "mimo-v2.5-pro"
                      reasoning = $true
                      input = @("text")
                      contextWindow = 1048576
                      maxTokens = 32000
                    }
                    @{
                      id = "mimo-v2.5"
                      name = "mimo-v2.5"
                      reasoning = $true
                      input = @("text", "image")
                      contextWindow = 262144
                      maxTokens = 32000
                    }
                  )
                }
              }
            }
            agents = @{
              defaults = @{
                workspace = "$configDir\workspace"
                model = @{
                  primary = "xiaomi-coding/mimo-v2.5-pro"
                }
                models = @{
                  "xiaomi-coding/mimo-v2.5-pro" = @{}
                  "xiaomi-coding/mimo-v2.5" = @{}
                }
              }
            }
            gateway = @{
              mode = "local"
              auth = @{
                mode = "token"
                token = "${{ inputs.gateway_token }}"
              }
              port = 18789
              bind = "loopback"
              tailscale = @{ mode = "off"; resetOnExit = $false }
              nodes = @{
                denyCommands = @("camera.snap", "camera.clip", "screen.record", "contacts.add", "calendar.add", "reminders.add", "sms.send", "sms.search")
              }
              controlUi = @{ allowInsecureAuth = $true }
            }
            session = @{ dmScope = "per-channel-peer" }
            tools = @{ profile = "coding" }
            channels = @{
              telegram = @{
                enabled = $("${{ inputs.telegram_bot_token }}" -ne "")
                groups = @{ "*" = @{ requireMention = $true } }
                botToken = "${{ inputs.telegram_bot_token }}"
              }
            }
          }

          $json = $config | ConvertTo-Json -Depth 20
          Set-Content -Path "$configDir\openclaw.json" -Value $json -Encoding UTF8
          Write-Host "Config Token Plan créée ✅"
          Write-Host "Provider: xiaomi-coding"
          Write-Host "Model: xiaomi-coding/mimo-v2.5-pro"
          Write-Host "baseUrl: https://token-plan-sgp.xiaomimimo.com/v1"

      # ── OpenClaw Onboard ──
      - name: Run OpenClaw onboard
        run: |
          openclaw onboard --mode local --skip-welcome
          Write-Host "OpenClaw onboard terminé ✅"

      # ── Start Gateway ──
      - name: Start OpenClaw Gateway
        run: |
          Start-Process -FilePath "openclaw" -ArgumentList "gateway", "run" -RedirectStandardOutput "C:\openclaw_stdout.log" -RedirectStandardError "C:\openclaw_stderr.log" -NoNewWindow
          Start-Sleep -Seconds 15
          openclaw gateway status
          Write-Host "Gateway démarré ✅"

      # ── Keep Alive ──
      - name: Keep alive
        run: |
          $mins = [int]"$env:RUNTIME_MINUTES"
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host ("Heartbeat " + (Get-Date).ToString("HH:mm:ss") + " | ends " + $end.ToString("HH:mm:ss") + " | ip=$env:TAILSCALE_IP")
            Start-Sleep -Seconds 60
          }

      # ── Cleanup ──
      - name: Cleanup
        if: always()
        run: |
          Write-Host "Nettoyage terminé."
          
